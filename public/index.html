<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>海克斯大乱斗 AI 辅助</title>
    <link rel="stylesheet" href="styles.css?v=20260716-flow" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="topbar">
          <div>
            <p class="eyebrow">英雄联盟海克斯大乱斗</p>
            <h1>海克斯大乱斗 AI 辅助</h1>
          </div>
          <span id="status" class="status">待查询</span>
        </div>

        <form id="search-form" class="search">
          <input
            id="champion-input"
            autocomplete="off"
            placeholder="输入英雄名：阿狸 / 光辉 / 卡莎 / 盲僧"
            aria-label="英雄名"
          />
          <button type="submit">生成攻略</button>
        </form>

        <section id="result" class="result empty">
          <div class="empty-state home-panel">
            <div class="home-copy">
              <p class="eyebrow">ARAM MAYHEM LOADOUT</p>
              <strong>输入英雄名，直接生成对局速查图。</strong>
              <span>按棱彩、金色、白银强化分层，给出对应出装路线和玩法判断。</span>
              <div class="home-stats" aria-label="数据概览">
                <span><b>173</b>英雄</span>
                <span><b>199</b>强化符文</span>
                <span><b>200</b>装备</span>
                <span><b>26.14</b>数据快照</span>
              </div>
            </div>
            <div class="champion-showcase" aria-hidden="true">
              <figure>
                <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ahri_0.jpg" alt="" />
                <figcaption>阿狸</figcaption>
              </figure>
              <figure>
                <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Yasuo_0.jpg" alt="" />
                <figcaption>亚索</figcaption>
              </figure>
              <figure>
                <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Kaisa_0.jpg" alt="" />
                <figcaption>卡莎</figcaption>
              </figure>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js?v=20260716-flow" type="module"></script>
  </body>
</html>
